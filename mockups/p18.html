<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>18 応募・1画面フォーム型</title><link rel="stylesheet" href="base.css">
<style>
  .phone { padding-bottom: 24px; }
  .consent { margin: 0 16px; background: #f6f7f9; border-radius: 12px; padding: 14px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; line-height: 1.7; }
  .consent .cb { width: 20px; height: 20px; border: 2px solid var(--brand); border-radius: 5px; background: var(--brand); color: #fff; text-align: center; line-height: 17px; flex-shrink: 0; font-size: 13px; }
</style></head>
<body>
<div class="phone">
  <header class="appbar"><span class="icon">‹</span><b style="font-size:15px;flex:1;text-align:center">応募フォーム</b><span></span></header>
  <section class="section" style="border-bottom:8px solid #f6f7f9">
    <p style="font-size:13px;color:var(--sub)">応募先</p>
    <h3 style="font-size:15.5px;margin-top:4px">結婚式の引き出物探しについてお伺いしたいです</h3>
    <div class="meta-line"><span class="badge fmt">インタビュー</span><span class="price" style="font-size:16px">7,260<small>pt｜90分</small></span></div>
  </section>
  <div class="q">
    <div class="qt">Q1. あなたの年齢を教えてください<span class="req">必須</span></div>
    <div class="opt on"><span class="r"></span>25〜29歳</div>
    <div class="opt"><span class="r"></span>30〜34歳</div>
    <div class="opt"><span class="r"></span>35〜39歳</div>
    <div class="opt"><span class="r"></span>上記以外</div>
  </div>
  <div class="q">
    <div class="qt">Q2. 結婚式（フォト婚除く）の実施状況<span class="req">必須</span></div>
    <div class="opt"><span class="r"></span>実施済み</div>
    <div class="opt on"><span class="r"></span>実施予定あり</div>
    <div class="opt"><span class="r"></span>予定なし</div>
  </div>
  <div class="q">
    <div class="qt">Q3. 引き出物選びで一番悩んだこと（自由回答）</div>
    <textarea class="ta" rows="3" placeholder="例）親族と友人で贈り分けるかどうか…"></textarea>
  </div>
  <div class="consent"><span class="cb">✓</span><span><a href="#" style="color:var(--brand);font-weight:700">利用規約</a>・<a href="#" style="color:var(--brand);font-weight:700">プライバシーポリシー</a>・アンケート参加規約に同意して応募します</span></div>
  <div class="px16 mt16">
    <a class="btn primary" href="p30.html">この内容で応募する</a>
    <p class="note center mt12">全11問・残り8問は次の画面で続きます</p>
  </div>
</div>
</body></html>
