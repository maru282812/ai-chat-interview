<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>37 応募A・1問ずつ型（実survey_question UI準拠）</title><link rel="stylesheet" href="base.css">
<style>
  /* 実際の survey.ejs（survey_question モード）の構造・クラス感を再現 */
  .phone { background: var(--paper); padding-bottom: 24px; }
  .survey-container { max-width: 480px; margin: 0 auto; padding: 16px; }
  .progress-bar-wrap { background: #E8DFC2; border-radius: 8px; height: 6px; margin-bottom: 16px; }
  .progress-bar { background: var(--teal); height: 100%; width: 27%; border-radius: 8px; }
  .question-card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(120,90,20,.10); margin-bottom: 12px; }
  .question-number { font-size: 12px; color: #8a7434; margin-bottom: 6px; }
  .question-text { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 12px; }
  .required-badge { font-size: 10px; color: #fff; background: #e55; border-radius: 4px; padding: 2px 5px; margin-left: 6px; vertical-align: middle; }
  .choice-list { display: flex; flex-direction: column; gap: 8px; }
  .choice-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid #E3DAba; border-radius: 10px; background: #fff; font-size: 14px; }
  .choice-item.selected { background: #E9F3F0; border-color: var(--teal); font-weight: 600; }
  .choice-item .r { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%; flex-shrink: 0; }
  .choice-item.selected .r { border: 5px solid var(--teal); }
  .nav-btns { display: flex; gap: 10px; margin-top: 16px; }
  .btn-next { flex: 1; padding: 14px; background: var(--teal); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; }
  .btn-back { padding: 14px 20px; background: none; color: var(--teal); border: 2px solid var(--teal); border-radius: 12px; font-size: 15px; }
</style></head>
<body class="t-hibi">
<div class="phone">
  <header class="appbar"><span class="icon">‹</span><b style="font-size:14.5px;flex:1;text-align:center">応募：髪や頭皮の保水について</b><span style="font-size:12px;color:var(--sub)">3/11</span></header>
  <div class="survey-container">
    <div class="progress-bar-wrap"><div class="progress-bar"></div></div>
    <div class="question-card">
      <div class="question-number">Q3 / 11（事前設問）</div>
      <div class="question-text">ヘアケア製品はどのくらいの頻度で使っていますか？<span class="required-badge">必須</span></div>
      <div class="choice-list">
        <div class="choice-item"><span class="r"></span>毎日</div>
        <div class="choice-item selected"><span class="r"></span>週2〜3回</div>
        <div class="choice-item"><span class="r"></span>週1回</div>
        <div class="choice-item"><span class="r"></span>それ以下</div>
      </div>
    </div>
    <div class="nav-btns"><button class="btn-back">戻る</button><button class="btn-next">次へ</button></div>
    <p class="note center mt16">実際の回答画面（survey_question）と同じUIで事前設問に答えます。<br>通過するとそのまま本編に進めます。</p>
  </div>
</div>
</body></html>
