<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>20 応募・確認画面型</title><link rel="stylesheet" href="base.css">
<style>
  .phone { padding-bottom: 24px; }
  .ans { border-bottom: 1px solid var(--line); padding: 13px 0; }
  .ans .k { font-size: 12px; color: var(--sub); }
  .ans .v { font-size: 14.5px; font-weight: 600; margin-top: 3px; display: flex; justify-content: space-between; }
  .ans .v a { color: var(--brand); font-size: 12.5px; font-weight: 700; }
</style></head>
<body>
<div class="phone">
  <header class="appbar"><span class="icon">‹</span><b style="font-size:15px;flex:1;text-align:center">応募内容の確認</b><span></span></header>
  <div class="steps"><span class="on"><b>1</b> 入力</span><i></i><span class="on"><b>2</b> 確認</span><i></i><span><b>3</b> 完了</span></div>
  <section class="section" style="border-bottom:8px solid #f6f7f9;padding-top:6px">
    <p style="font-size:13px;color:var(--sub)">応募先</p>
    <h3 style="font-size:15.5px;margin-top:4px">結婚式の引き出物探しについてお伺いしたいです</h3>
    <div class="meta-line"><span class="badge fmt">インタビュー</span><span class="price" style="font-size:16px">7,260<small>pt｜90分</small></span></div>
  </section>
  <div class="px16">
    <div class="ans"><div class="k">Q1. 年齢</div><div class="v">25〜29歳 <a href="#">修正</a></div></div>
    <div class="ans"><div class="k">Q2. 結婚式の実施状況</div><div class="v">実施予定あり <a href="#">修正</a></div></div>
    <div class="ans"><div class="k">Q3. 引き出物選びで悩んだこと</div><div class="v">親族と友人で贈り分けるか迷った <a href="#">修正</a></div></div>
    <div class="ans"><div class="k">Q4〜Q11</div><div class="v">回答済み <a href="#">修正</a></div></div>
  </div>
  <div class="px16 mt16">
    <div style="background:#f6f7f9;border-radius:12px;padding:14px;font-size:12.5px;line-height:1.8;color:#555">
      送信すると<b>利用規約・プライバシーポリシー・アンケート参加規約</b>に同意したものとみなされます。応募後の取り消しはやりとり画面からできます。
    </div>
    <a class="btn primary mt16" href="p30.html">応募を確定する</a>
    <a class="btn sub mt12" href="#">‹ 入力に戻る</a>
  </div>
</div>
</body></html>
