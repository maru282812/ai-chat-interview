<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>19 応募・チャット型</title><link rel="stylesheet" href="base.css">
<style>
  body { background: #8aa2c8; }
  .phone { background: #b9c9e2; padding-bottom: 88px; }
  .chat { padding: 14px 12px; }
  .day { text-align: center; margin: 6px 0 14px; }
  .day span { background: rgba(0,0,0,.25); color: #fff; font-size: 11px; border-radius: 12px; padding: 4px 12px; }
  .brow { display: flex; gap: 8px; margin-bottom: 12px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .bub { max-width: 78%; border-radius: 16px; padding: 11px 14px; font-size: 14px; line-height: 1.65; background: #fff; border-top-left-radius: 4px; }
  .bub.me { background: #8de055; margin-left: auto; border-top-left-radius: 16px; border-bottom-right-radius: 4px; }
  .quick { display: flex; flex-wrap: wrap; gap: 8px; margin: 4px 0 14px 42px; }
  .quick span { background: #fff; border: 1.5px solid var(--brand); color: var(--brand); border-radius: 18px; padding: 8px 14px; font-size: 13.5px; font-weight: 700; }
  .inputbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #fff; display: flex; gap: 8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  .inputbar input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 14px; font-size: 14px; }
  .inputbar .send { color: var(--brand); font-size: 22px; align-self: center; }
</style></head>
<body>
<div class="phone">
  <header class="appbar"><span class="icon">‹</span><b style="font-size:15px;flex:1;text-align:center">髪や頭皮の保水についてのAIインタビュー</b><span></span></header>
  <div class="chat">
    <div class="day"><span>応募して回答をはじめる（約15分・500pt）</span></div>
    <div class="brow"><span class="avatar">🤖</span><div class="bub">こんにちは！応募ありがとうございます。まず参加条件の確認をさせてください。あなたの年代を教えてもらえますか？</div></div>
    <div class="quick"><span>20代</span><span>30代</span><span>40代</span><span>その他</span></div>
    <div class="brow"><div class="bub me">30代です</div></div>
    <div class="brow"><span class="avatar">🤖</span><div class="bub">ありがとうございます✨ 条件を満たしています！ではさっそく、ふだんのヘアケアで一番気になっていることを教えてください。</div></div>
    <div class="brow"><div class="bub me">乾燥で髪が広がりやすいことです</div></div>
    <div class="brow"><span class="avatar">🤖</span><div class="bub">広がりが特に気になるのは、どんな場面が多いですか？朝のセット時、外出先など、具体的に教えてください 😊</div></div>
  </div>
  <div class="inputbar"><input placeholder="メッセージを入力"><span class="send">➤</span></div>
</div>
</body></html>
