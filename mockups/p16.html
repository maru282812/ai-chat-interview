<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">

<body>
<div class="phone">
  <header class="appbar"><span class="icon">‹</span><b style="font-size:15px;flex:1;text-align:center">案件詳細</b><span class="icon">☆</span></header>
