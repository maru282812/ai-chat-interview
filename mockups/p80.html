<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>80 起動時デイリー・インタースティシャル</title><link rel="stylesheet" href="base.css">
<style>
  .phone { padding-bottom: 0; display: flex; flex-direction: column; min-height: 100vh; }
  /* 最小chrome：×だけ */
  .top { display: flex; padding: 14px 16px 4px; }
  .top .close { margin-left: auto; width: 34px; height: 34px; border-radius: 50%; background: #F0E6C8; color: #8a7434; display: flex; align-items: center; justify-content: center; font-size: 18px; text-decoration: none; }
  .wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 8px 20px 28px; }
  .kicker { text-align: center; font-size: 12px; color: #A97814; font-weight: 800; letter-spacing: .04em; }
  .title { text-align: center; font-size: 21px; font-weight: 900; margin-top: 6px; }
  .sub { text-align: center; font-size: 12.5px; color: var(--sub); margin-top: 6px; }
  .qcard { background: #fff; border-radius: 18px; padding: 20px; box-shadow: 0 6px 20px rgba(120,90,20,.12); margin-top: 22px; }
  .qcard .q { font-size: 16px; font-weight: 700; line-height: 1.5; margin-bottom: 14px; }
  .opt { display: flex; align-items: center; gap: 10px; border: 1.5px solid #E3DAba; border-radius: 12px; padding: 13px 14px; font-size: 14.5px; margin-bottom: 10px; }
  .opt.on { border-color: var(--teal); background: #E9F3F0; font-weight: 700; }
  .opt .r { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%; flex-shrink: 0; }
  .opt.on .r { border: 5px solid var(--teal); }
  .go { margin-top: 6px; }
  .skip { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: var(--sub); }
  .dots { display: flex; gap: 5px; justify-content: center; margin-top: 18px; }
  .dots i { width: 6px; height: 6px; border-radius: 50%; background: #E3DAba; }
  .dots i.on { width: 18px; border-radius: 3px; background: #DFA02F; }
</style></head>
<body class="t-hibi">
<div class="phone">
  <div class="top"><a class="close" href="p51.html">✕</a></div>
  <div class="wrap">
    <div class="kicker">☀️ 7月4日（金）</div>
    <div class="title">今日のデイリーアンケート</div>
    <div class="sub">1問・約30秒で <b style="color:var(--teal)">10pt</b> もらえます</div>

    <div class="qcard">
      <div class="q">今日、朝食はとりましたか？</div>
      <div class="opt on"><span class="r"></span>しっかり食べた</div>
      <div class="opt"><span class="r"></span>軽く済ませた</div>
      <div class="opt"><span class="r"></span>食べていない</div>
      <a class="btn primary go" href="p72.html">回答して10ptもらう</a>
    </div>

    <a class="skip" href="p51.html">スキップして案件をさがす →</a>
    <div class="dots"><i class="on"></i><i></i></div>
  </div>
</div>
</body></html>
