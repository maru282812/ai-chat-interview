<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>81 探す＋上位デイリーバナー（案・なしにもできる）</title><link rel="stylesheet" href="base.css">
<style>
  .chips { background: #FFFdf6; border-bottom: 1px solid var(--paper); }
  /* ×後の再入口＝スリムなデイリーバナー（消す/答えると非表示にできる） */
  .daily-banner { display: flex; align-items: center; gap: 10px; margin: 12px 16px 0; background: linear-gradient(150deg,#FCF4DE,#FBEFC8); border: 1px solid #EAD79A; border-radius: 12px; padding: 11px 13px; }
  .daily-banner .i { font-size: 20px; }
  .daily-banner .t { font-size: 13px; font-weight: 800; }
  .daily-banner .d { font-size: 11px; color: #8a7434; margin-top: 1px; }
  .daily-banner .go { margin-left: auto; background: var(--teal); color: #fff; font-size: 12px; font-weight: 800; border-radius: 16px; padding: 7px 13px; flex-shrink: 0; }
  .daily-banner .x { color: #b8a878; font-size: 15px; padding: 0 2px; }
  .pick { margin: 12px 16px 0; background: linear-gradient(150deg,#0E6B5A,#17977f); color: #fff; border-radius: 16px; padding: 16px; }
  .pick .lbl { font-size: 11.5px; font-weight: 800; background: rgba(255,255,255,.18); display: inline-block; border-radius: 20px; padding: 4px 12px; }
  .pick h3 { font-size: 16px; line-height: 1.5; margin-top: 10px; }
  .pick .foot { display: flex; align-items: center; margin-top: 12px; }
  body.t-hibi .pick .price { color: #FFE9A8; font-size: 20px; font-weight: 900; }
  .pick .btn { margin-left: auto; background: #fff; color: var(--teal); padding: 9px 16px; font-size: 13px; border-radius: 22px; }
</style></head>
<body class="t-hibi">
<div class="phone">
  <header class="appbar"><span class="logo">Hibi</span><span class="search">キーワードで探す</span><span class="bell has"></span></header>
  <nav class="chips">
    <span class="chip on">すべて</span><span class="chip">🍚 生活系</span><span class="chip">💼 仕事系</span><span class="chip">⚡ 即回答OK</span>
  </nav>

  <!-- ▼ 上位デイリーバナー（起動時×した人向けの再入口・任意／回答済なら非表示） -->
  <div class="daily-banner">
    <span class="i">☀️</span>
    <div><div class="t">今日のデイリーアンケート（未回答）</div><div class="d">1問・約30秒で10pt</div></div>
    <a class="go" href="p80.html">答える</a>
    <span class="x">✕</span>
  </div>
  <!-- △ このバナーは「なし」にもできる。その場合は起動時インタースティシャルのみでデイリーへ誘導 -->

  <div class="pick">
    <span class="lbl">✨ あなたにピッタリ</span>
    <h3>目・目元悩みのある30代の方にお話を聞きたい</h3>
    <div class="foot"><span class="price">500<small style="font-size:12px;color:rgba(255,255,255,.8)">pt｜15分</small></span><a class="btn" href="p56.html">見る ›</a></div>
  </div>

  <div class="reco-h" style="padding-top:16px">ほかの案件</div>
  <main class="cards">
    <article class="card rf">
      <div class="pt hot"><small>⚡即回答</small><b>500<small>pt</small></b><div class="min">⏱ 15分</div></div>
      <div><h3>髪や頭皮の保水を意識されている方に話を聞きたい！</h3>
        <div class="meta-line"><span class="badge ai">AIインタビュー</span></div>
        <div class="foot"><span class="days">あと<b>5</b>日</span><button class="btn-save saved">★ 保存済</button></div></div>
    </article>
    <article class="card rf">
      <div class="pt"><small>謝礼</small><b>7,260<small>pt</small></b><div class="min">⏱ 90分</div></div>
      <div><h3>結婚式の引き出物探しについてお伺いしたいです</h3>
        <div class="meta-line"><span class="badge new">新着</span><span class="badge fmt">選考あり</span></div>
        <div class="foot"><span class="days">あと<b>13</b>日</span><button class="btn-save">☆ 保存</button></div></div>
    </article>
  </main>
  <div class="fab">⇅ 新着順</div>
  <nav class="bottomnav"><a class="on" href="#"><span class="i">🔍</span>探す</a><a href="p59.html"><span class="i">☆</span>保存</a><a href="p61.html"><span class="i">📋</span>やりとり</a><a href="p40.html"><span class="i">👤</span>マイページ</a></nav>
</div>
</body></html>
