<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>70 退会確認（仮）</title><link rel="stylesheet" href="base.css">
<style>
  .phone { padding-bottom: 24px; }
  .warn { margin: 14px 16px 0; background: var(--danger-weak); border: 1.5px solid #F0B9BB; border-radius: 14px; padding: 16px; }
  .warn .t { color: var(--danger); font-weight: 900; font-size: 15px; }
  .warn li { list-style: none; font-size: 13px; color: #A34; line-height: 1.8; padding-left: 1em; text-indent: -1em; margin-top: 6px; }
  .warn li::before { content: "・"; }
  .gh { padding: 18px 16px 8px; font-weight: 800; font-size: 13.5px; color: #A97814; }
</style></head>
<body class="t-hibi">
<div class="phone">
  <header class="appbar"><span class="icon">‹</span><b style="font-size:16px;flex:1;text-align:center">退会する</b><span></span></header>
  <div class="warn">
    <div class="t">⚠ 退会すると元に戻せません</div>
    <ul>
      <li>保有ポイント <b>2,300pt</b> は失効します</li>
      <li>応募中・当選中の案件はすべて取り消されます</li>
      <li>回答履歴・プロフィールは削除されます</li>
    </ul>
  </div>
  <div class="gh">よろしければ理由を教えてください（任意）</div>
  <div class="px16">
    <div class="opt"><span class="r"></span>案件が少ない・合わない</div>
    <div class="opt"><span class="r"></span>通知が多い</div>
    <div class="opt"><span class="r"></span>ポイントが貯まりにくい</div>
    <div class="opt"><span class="r"></span>その他</div>
  </div>
  <div class="px16 mt16">
    <div style="background:var(--brand-weak);border-radius:12px;padding:13px;font-size:12.5px;color:#7A6428;line-height:1.7">💡 通知が多い場合は<a href="p67.html" style="color:#A97814;font-weight:800">通知設定</a>で頻度を「週1回」に変えられます。ポイントを交換してから退会するのがおすすめです。</div>
    <a class="btn mt16" style="background:var(--danger);color:#fff" href="#">退会を確定する</a>
    <a class="btn sub mt12" href="p40.html">やめておく（マイページへ戻る）</a>
  </div>
</div>
</body></html>
