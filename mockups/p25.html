<style>
  .dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px 16px; }

  .dcard .k { font-size: 11.5px; color: var(--sub); }
  .dcard .v { font-size: 22px; font-weight: 900; margin-top: 4px; }

  .dcard.hero { grid-column: 1 / -1; background: linear-gradient(135deg,var(--brand),#ffab5e); border: 0; color: #fff; display: flex; align-items: center; }
  .dcard.hero .v { font-size: 30px; }
  .dcard.hero .k { color: rgba(255,255,255,.85); }
  .dcard.hero .btn { margin-left: auto; background: #fff; color: var(--brand); padding: 10px 16px; font-size: 13px; border-radius: 20px; }
