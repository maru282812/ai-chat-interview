<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>56 詳細B・バナーをヒーロー化（バナー→3カード浮遊→チャット）</title><link rel="stylesheet" href="base.css">
<style>
  .phone { padding-bottom: 90px; }
  .hero { background: linear-gradient(150deg,#0E6B5A,#17977f); color: #fff; padding: 20px 16px 30px; }
  .hero .meta-line .badge { background: rgba(255,255,255,.18); color: #fff; }
  .hero h3 { font-size: 18px; line-height: 1.55; }
  .hero .t { margin-top: 12px; font-weight: 900; font-size: 14.5px; color: #FFE9A8; }
  .hero p { font-size: 12.5px; margin-top: 5px; line-height: 1.7; opacity: .95; }
  /* 3カードをヒーローに重ねて浮遊 */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: -20px 16px 0; position: relative; }
  .stat { background: #fff; border-radius: 14px; text-align: center; padding: 13px 6px; box-shadow: 0 3px 10px rgba(120,90,20,.14); }
  .stat .k { font-size: 10.5px; color: #A97814; font-weight: 700; }
  .stat .v { font-weight: 900; color: var(--teal); font-size: 16px; margin-top: 3px; }
  .stat .v small { font-size: 11px; }
  .chatpv { margin: 14px 16px 0; background: #fff; border-radius: 14px; padding: 14px; }
  .bub { max-width: 85%; border-radius: 16px; padding: 10px 13px; font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
  .bub.ai { background: var(--paper); border-top-left-radius: 4px; }
  .bub.me { background: var(--teal); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
</style></head>
<body class="t-hibi">
<div class="phone">
  <header class="appbar"><span class="icon">‹</span><b style="font-size:15px;flex:1;text-align:center">案件詳細</b><span class="icon" style="color:#A97814">☆</span></header>

  <!-- 即回答バナー（ヒーロー） -->
  <div class="hero">
    <div class="meta-line" style="margin:0 0 10px"><span class="badge">AIインタビュー</span><span class="badge">新着</span></div>
    <h3>髪や頭皮の保水を意識されている方に話を聞きたい！</h3>
    <div class="t">⚡ 応募後、すぐに回答できます</div>
    <p>選考・日程調整なし。完了と同時に500ptが付与されます。</p>
  </div>

  <!-- 要点3カード（浮遊） -->
  <div class="stats">
    <div class="stat"><div class="k">謝礼</div><div class="v">500<small>pt</small></div></div>
    <div class="stat"><div class="k">所要時間</div><div class="v">約15<small>分</small></div></div>
    <div class="stat"><div class="k">締切</div><div class="v">あと5<small>日</small></div></div>
  </div>

  <!-- チャットプレビュー -->
  <div class="chatpv">
    <div style="font-size:11px;color:var(--sub);margin-bottom:8px">💬 こんなイメージで進みます</div>
    <div class="bub ai">こんにちは！ふだんのヘアケアで一番気になっていることを教えてください 😊</div>
    <div class="bub me">乾燥で髪が広がりやすいのが悩みです</div>
    <div class="bub ai">広がりが気になるのはどんな場面が多いですか？</div>
  </div>

  <section class="section" style="background:#fff;margin:14px 16px 0;border-radius:14px;border-bottom:0">
    <div class="sec-title">👤 募集条件</div>
    <ul class="list-dot"><li>20〜40代の女性</li><li>週1回以上ヘアケア製品を使っている方</li></ul>
    <div class="ngbox"><div class="t" style="color:var(--danger)">⚠ NG条件</div><ul><li>美容・ヘアケア業界に従事されている方</li></ul></div>
  </section>

  <div class="cta-fixed" style="background:#FFFdf6"><button class="btn-save">☆</button><a class="btn primary" href="p39.html">応募してすぐ回答する ⚡</a></div>
</div>
</body></html>
